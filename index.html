<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Birthday Magic ✨</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui;
  overflow:hidden;
  height:100vh;
  background:radial-gradient(circle at top,#24123d,#0a0818 70%);
  color:#fff;
}
canvas{position:fixed;inset:0;z-index:0}

/* aurora blobs */
.blob{
  position:fixed;width:340px;height:340px;border-radius:50%;
  filter:blur(90px);opacity:.45;z-index:0;
  animation:drift 14s ease-in-out infinite alternate;
}
.b1{background:#ff71a8;top:5%;left:8%}
.b2{background:#7f7cff;bottom:8%;right:10%}
.b3{background:#ffd56b;top:40%;left:40%}
@keyframes drift{to{transform:translate(60px,-50px) scale(1.2)}}

.scene{
  position:absolute;inset:0;display:flex;justify-content:center;align-items:center;
  padding:20px;opacity:0;transform:scale(.95) translateY(20px);
  transition:1s ease;pointer-events:none;z-index:2;text-align:center;
}
.scene.active{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}

.card{
  max-width:560px;width:100%;padding:30px;border-radius:28px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 40px 120px rgba(0,0,0,.65);
  animation:pop .8s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

h1{font-size:2rem;margin-bottom:12px}
p{white-space:pre-line;line-height:1.7;min-height:140px;opacity:.95}

button{
  margin-top:14px;padding:14px 20px;border:none;border-radius:16px;
  background:linear-gradient(90deg,#ff5c8a,#ff9f68);
  color:#fff;font-size:1rem;cursor:pointer;
  box-shadow:0 12px 30px rgba(255,92,138,.35);
  transition:.25s;
}
button:hover{transform:translateY(-2px) scale(1.03)}
button:active{transform:scale(.97)}

/* cute floating stickers */
.floaty{position:fixed;font-size:22px;pointer-events:none;animation:rise linear forwards;z-index:3}
@keyframes rise{
  0%{transform:translateY(20px) scale(.8);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-100vh) rotate(360deg) scale(1.2);opacity:0}
}

/* stars twinkle */
.star{
  position:fixed;width:3px;height:3px;background:white;border-radius:50%;
  animation:twinkle 2s infinite alternate;opacity:.6;z-index:1;
}
@keyframes twinkle{to{opacity:1;transform:scale(1.8)}}

/* cursor pet */
.pet{position:fixed;font-size:24px;pointer-events:none;z-index:4;transition:.12s}

/* confetti burst */
.confetti{position:fixed;font-size:14px;pointer-events:none;z-index:5;animation:burst 1s ease-out forwards}
@keyframes burst{to{transform:translate(var(--x),var(--y)) rotate(540deg);opacity:0}}

.music{
  position:fixed;top:14px;right:14px;z-index:6;
  background:rgba(255,255,255,.1);padding:10px 14px;border-radius:999px;
  font-size:.9rem;cursor:pointer;border:1px solid rgba(255,255,255,.12)
}
</style>
</head>
<body>

<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<canvas id="bg"></canvas>
<div class="music" onclick="toggleMusic()">🎵 Music</div>
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5c4b1b5.mp3?filename=soft-piano-ambient-110397.mp3">
</audio>

<div class="scene active" id="s1">
  <div class="card">
    <h1>🎀 Birthday Surprise</h1>
    <p>A tiny magical experience for someone fun, chaotic, and impossible to ignore ✨</p>
    <button onclick="start(event)">Open Surprise</button>
  </div>
</div>

<div class="scene" id="s2">
  <div class="card">
    <h1>Hey Aisha 👋</h1>
    <p id="t"></p>
    <button onclick="next(event)">One More</button>
  </div>
</div>

<div class="scene" id="s3">
  <div class="card">
    <h1>💖 Happy Birthday</h1>
    <p id="f"></p>
  </div>
</div>

<script>
// stars
for(let i=0;i<50;i++){
 let s=document.createElement('div');
 s.className='star';
 s.style.left=Math.random()*100+'vw';
 s.style.top=Math.random()*100+'vh';
 s.style.animationDelay=Math.random()*2+'s';
 document.body.appendChild(s);
}

// particle bg
const c=document.getElementById('bg'),x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let pts=Array.from({length:70},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3}));
function bg(){x.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>c.width)p.dx*=-1;if(p.y<0||p.y>c.height)p.dy*=-1;x.beginPath();x.arc(p.x,p.y,p.r,0,6.28);x.fillStyle='rgba(255,255,255,.25)';x.fill()});requestAnimationFrame(bg)}bg();

function show(id){document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function type(id,text,i=0){let el=document.getElementById(id);if(i===0)el.innerHTML='';if(i<text.length){el.innerHTML+=text[i];setTimeout(()=>type(id,text,i+1),24)}}

function start(e){
 show('s2');spawn();burst(e);
 type('t',`Okay 😄\n\nYou somehow manage to be:\nfunny 😂 stressed 😭 happy 😆 dramatic 😤\n\nAnd somehow… still cute.`)
}
function next(e){
 show('s3');spawn();burst(e);
 type('f',`Happy Birthday Aisha 🎉\n\nStay funny. Stay chaotic. Stay adorable.\n\nThat’s already a pretty good deal 💖`)
}

function spawn(){
 let arr=['💖','🌸','✨','🎀','🐻','🐱','💫'];
 for(let i=0;i<18;i++){
   let d=document.createElement('div');d.className='floaty';
   d.innerText=arr[Math.floor(Math.random()*arr.length)];
   d.style.left=Math.random()*100+'vw';
   d.style.bottom='-20px';
   d.style.animationDuration=(4+Math.random()*4)+'s';
   document.body.appendChild(d);setTimeout(()=>d.remove(),8000)
 }
}

function burst(e){
 for(let i=0;i<12;i++){
  let c=document.createElement('div');c.className='confetti';c.innerText=['✨','💖','🎉'][i%3];
  c.style.left=e.clientX+'px';c.style.top=e.clientY+'px';
  c.style.setProperty('--x',(Math.random()*140-70)+'px');
  c.style.setProperty('--y',(Math.random()*-140)+'px');
  document.body.appendChild(c);setTimeout(()=>c.remove(),1000)
 }
}

// cursor pet
const pet=document.createElement('div');pet.className='pet';pet.innerText='🐻';document.body.appendChild(pet);
window.addEventListener('mousemove',e=>{pet.style.left=e.clientX+14+'px';pet.style.top=e.clientY+14+'px'})

function toggleMusic(){let m=document.getElementById('music');m.paused?m.play():m.pause()}
</script>
</body>
</html>
