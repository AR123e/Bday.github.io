<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 Happy Birthday!</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,#1a0a2e 0%,#2d1250 40%,#1a0a2e 100%);min-height:100vh;font-family:'Nunito',sans-serif;overflow-x:hidden;cursor:default}

/* Sky & Stars */
#sky{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twink var(--d) ease-in-out infinite;opacity:0}
@keyframes twink{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:var(--o);transform:scale(1)}}

/* Confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:200}
.cp{position:absolute;top:-20px;left:var(--x);width:var(--w);height:var(--h);background:var(--c);border-radius:var(--r);animation:fall var(--dur) var(--del) linear forwards;opacity:0}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}90%{opacity:.8}100%{transform:translateY(105vh) rotate(var(--rot));opacity:0}}

/* Floating hearts & emojis */
#floaters{position:fixed;inset:0;pointer-events:none;z-index:3}
.floater{position:absolute;bottom:-50px;left:var(--x);font-size:var(--s);animation:rise var(--d) var(--del) ease-in infinite;opacity:0}
@keyframes rise{0%{opacity:0;transform:translateY(0) rotate(var(--r))}10%{opacity:1}85%{opacity:.7}100%{opacity:0;transform:translateY(-110vh) rotate(calc(var(--r)*-2))}}

/* Balloons on sides */
#balloons{position:fixed;bottom:0;width:100%;pointer-events:none;z-index:2}
.bwrap{position:absolute;bottom:0;animation:sway var(--fd) ease-in-out infinite alternate}
@keyframes sway{0%{transform:translateY(0) rotate(var(--tilt))}100%{transform:translateY(-25px) rotate(calc(var(--tilt)*-1))}}
.ball{border-radius:50% 50% 45% 45%;position:relative;box-shadow:inset -5px -5px 12px rgba(0,0,0,.18),inset 4px 4px 10px rgba(255,255,255,.22)}
.ball::before{content:'';position:absolute;top:16%;left:18%;width:26%;height:20%;background:rgba(255,255,255,.4);border-radius:50%;transform:rotate(-28deg)}
.ball::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:3px solid transparent;border-right:3px solid transparent;border-top:6px solid var(--bc)}
.bstring{width:1px;height:var(--sh);background:rgba(255,255,255,.35);margin:0 auto}

/* Main stage */
#stage{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem 3rem}

/* Banner */
.banner{font-family:'Pacifico',cursive;font-size:clamp(2rem,6vw,4rem);color:#fff;text-align:center;text-shadow:0 0 40px rgba(255,180,80,.9),0 0 80px rgba(255,100,150,.5);animation:bannerIn 1.2s cubic-bezier(.34,1.56,.64,1) .2s forwards;opacity:0;line-height:1.15;margin-bottom:.2rem}
@keyframes bannerIn{from{opacity:0;transform:translateY(-50px) scale(.6)}to{opacity:1;transform:translateY(0) scale(1)}}

.tagline{font-size:clamp(.9rem,2.5vw,1.3rem);color:rgba(255,220,200,.9);font-weight:700;text-align:center;animation:up 1s ease .9s forwards;opacity:0;margin-bottom:2rem;letter-spacing:.04em}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Scene container */
.scene{position:relative;width:min(680px,98vw);animation:up 1s ease .4s forwards;opacity:0}

/* Ground */
.ground{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(180deg,#6b3fa0 0%,#4a2878 100%);border-radius:0 0 16px 16px;overflow:hidden}
.ground::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 2px,transparent 2px,transparent 40px)}

/* Cake platform */
.platform{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);z-index:15}

/* Dolls */
.doll{position:absolute;bottom:52px;display:flex;flex-direction:column;align-items:center;animation:dollBounce 3s ease-in-out infinite}
@keyframes dollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Sparkle click effect */
.sparkle{position:fixed;pointer-events:none;z-index:500;font-size:1.4rem;animation:spark .7s ease forwards}
@keyframes spark{0%{transform:scale(0) rotate(0);opacity:1}60%{transform:scale(1.4) rotate(180deg);opacity:1}100%{transform:scale(.3) rotate(360deg) translateY(-50px);opacity:0}}

/* Message card */
.msgcard{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:1.2rem 2rem;text-align:center;color:rgba(220,200,255,.9);font-size:clamp(.85rem,2vw,1.05rem);line-height:1.6;max-width:500px;backdrop-filter:blur(8px);animation:up 1s ease 1.4s forwards;opacity:0;margin-top:1.5rem}

/* Buttons */
.btnrow{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:up 1s ease 1.7s forwards;opacity:0;margin-top:1.2rem}
.btn{padding:.75rem 1.8rem;border-radius:50px;border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:transform .18s,box-shadow .18s;letter-spacing:.02em}
.btn:hover{transform:translateY(-3px) scale(1.06)}
.btn:active{transform:scale(.96)}
.btn-a{background:linear-gradient(135deg,#ff6eb4,#e040a0);color:#fff;box-shadow:0 6px 25px rgba(220,60,150,.5)}
.btn-b{background:rgba(255,255,255,.1);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
.btn-b:hover{background:rgba(255,255,255,.18)}

/* Wish text */
.wishtext{color:#ffd700;font-size:.95rem;font-weight:700;text-align:center;min-height:1.4em;animation:up .4s ease forwards;margin-top:.5rem}
</style>
</head>
<body>

  <p class="msgcard">Today we celebrate YOU! 🎀 May every moment sparkle with joy, every wish come true, and every bite of cake taste like pure magic. You are so loved! 💖✨</p>

  <div class="btnrow">
    <button class="btn btn-a" id="cb">🎉 Celebrate!</button>
    <button class="btn btn-b" id="wb">🌟 Make a Wish</button>

<style>
@keyframes dollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
#doll1{animation:dollBounce 3.2s ease-in-out infinite}
#doll2{animation:dollBounce 2.8s ease-in-out infinite;animation-delay:.5s}
</style>

<script>
const colors=['#ff6eb4','#ffd700','#c084fc','#6ee7b7','#f9a8d4','#fbbf24','#a78bfa','#ff8b94','#86efac'];
const emojis=['💖','💝','⭐','✨','🎀','🌸','💫','🎊','🎈','🌈','🍰','🎁'];
const wishes=['🌟 Wish sent straight to the stars!','💫 Magic is flying your way!','🎁 Something wonderful is coming...','🌈 The universe heard you!','✨ Granted! (with extra glitter!)','💖 Your heart\'s desire is on its way!'];

// Stars
const sky=document.getElementById('sky');
for(let i=0;i<140;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*4+2}s;--o:${Math.random()*.8+.2};animation-delay:${Math.random()*6}s`;sky.appendChild(s)}

// Balloons
const balloonData=[
  {x:2,bc:'#ff6eb4',w:52,sh:95,tilt:-7,fd:'4s'},{x:8,bc:'#fde68a',w:62,sh:115,tilt:5,fd:'3.7s'},
  {x:15,bc:'#a78bfa',w:48,sh:80,tilt:-4,fd:'4.4s'},{x:82,bc:'#6ee7b7',w:55,sh:100,tilt:6,fd:'3.9s'},
  {x:89,bc:'#f9a8d4',w:60,sh:108,tilt:-6,fd:'4.2s'},{x:95,bc:'#fbbf24',w:48,sh:78,tilt:8,fd:'3.6s'},
];
const bEl=document.getElementById('balloons');
balloonData.forEach(b=>{const w=document.createElement('div');w.className='bwrap';w.style.cssText=`left:${b.x}%;--fd:${b.fd};--tilt:${b.tilt}deg`;w.innerHTML=`<div class="ball" style="width:${b.w}px;height:${b.w*1.2}px;--bc:${b.bc};background:${b.bc}"></div><div class="bstring" style="--sh:${b.sh}px;height:${b.sh}px"></div>`;bEl.appendChild(w)});

// Floaters
const fEl=document.getElementById('floaters');
for(let i=0;i<20;i++){const f=document.createElement('div');f.className='floater';f.textContent=emojis[Math.floor(Math.random()*emojis.length)];f.style.cssText=`--x:${Math.random()*100}%;--s:${Math.random()*1.4+.7}rem;--d:${Math.random()*6+5}s;--del:${Math.random()*10}s;--r:${Math.random()*40-20}deg`;fEl.appendChild(f)}

function boom(big){
  const c=document.getElementById('confetti');
  const n=big?90:45;
  for(let i=0;i<n;i++){const p=document.createElement('div');p.className='cp';const w=Math.random()*10+4,h=Math.random()>0.5?Math.random()*14+5:w;const col=colors[Math.floor(Math.random()*colors.length)];p.style.cssText=`--x:${Math.random()*100}%;--w:${w}px;--h:${h}px;--c:${col};--r:${Math.random()>0.5?'3px':'50%'};--dur:${Math.random()*3.5+2.5}s;--del:${big?Math.random()*.4:Math.random()*2.5}s;--rot:${Math.random()*720-360}deg`;c.appendChild(p);setTimeout(()=>p.remove(),big?5500:7000)}
}

document.addEventListener('click',e=>{
  for(let i=0;i<6;i++){const s=document.createElement('div');s.className='sparkle';s.textContent=['✨','💫','⭐','🌟','💖','🎀'][Math.floor(Math.random()*6)];s.style.left=(e.clientX+Math.random()*70-35)+'px';s.style.top=(e.clientY+Math.random()*70-35)+'px';document.body.appendChild(s);setTimeout(()=>s.remove(),800)}
});

let wc=0;
document.getElementById('wb').addEventListener('click',function(){
  boom(false);
  const wt=document.getElementById('wt');
  wt.textContent=wishes[wc%wishes.length];wc++;
  this.textContent='🌟 Wish Again!';
  setTimeout(()=>{wt.textContent='';this.textContent='🌟 Make a Wish'},3500);
});

document.getElementById('cb').addEventListener('click',()=>{
  boom(true);
  for(let i=0;i<8;i++){const f=document.createElement('div');f.className='floater';f.textContent=emojis[Math.floor(Math.random()*emojis.length)];f.style.cssText=`--x:${Math.random()*100}%;--s:${Math.random()*2+1}rem;--d:${Math.random()*4+3}s;--del:0s;--r:${Math.random()*40-20}deg;position:fixed;bottom:-50px`;fEl.appendChild(f);setTimeout(()=>f.remove(),9000)}
});

setTimeout(()=>boom(false),500);
setTimeout(()=>boom(true),1400);
</script>
</body>
</html>
